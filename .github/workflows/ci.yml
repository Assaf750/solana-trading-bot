# CI — runs the Node test suite. No external dependencies, no network calls, no build step.
# (The former SSOT-drift / mechanism-guard standalone steps were removed with the SSOT
#  governance system; the mechanism-guard code-hygiene scan still runs via the package tests.)
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No `npm install`: server + packages have zero runtime dependencies; tests run on plain Node.
      - name: Unit + integration tests
        run: node --test
