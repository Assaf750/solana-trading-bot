# CI — Hardening Guards (PR-H1, extended PR-H2). Runs the guards automatically.
# No external dependencies, no network runtime calls, no build step, no product logic.
# Guards: SSOT drift/candidate/forbidden guard + mechanism (Gate-D/E live-mechanism) guard
# + the Node test suite.
name: CI

on:
  push:
  pull_request:

jobs:
  guards:
    name: SSOT drift + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # No `npm install`: the repo has zero runtime dependencies; guards run on plain Node.
      - name: SSOT drift / candidate / forbidden guard
        run: node tools/check-ssot-drift.mjs

      - name: Mechanism guard (no live Gate-D/E mechanisms)
        run: node tools/check-mechanism-guards.mjs

      - name: Unit + integration tests
        run: node --test
